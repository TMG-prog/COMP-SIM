name: Build BankSim GUI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v2

      - name: Compile banksim_gui.cpp
        run: g++ -O2 -mwindows -o banksim_gui.exe banksim_gui.cpp -lcomctl32

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: banksim_gui
          path: banksim_gui.exe
